name: Buscar ICC INDEC

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  buscar-icc:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Playwright y Chromium
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Buscar ICC en INDEC
        run: python3 buscar_icc.py
        timeout-minutes: 3

      - name: Commit y push
        run: |
          git config user.name "icc-bot"
          git config user.email "bot@fj-app"
          git add icc-data.json
          git diff --staged --quiet || git commit -m "ICC actualizado $(date +%Y-%m-%d)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
