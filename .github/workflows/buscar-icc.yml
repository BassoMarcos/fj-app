name: Buscar ICC INDEC

on:
  schedule:
    - cron: "0 11 * * *"  # 8am Argentina (UTC-3), todos los dias
  workflow_dispatch:       # tambien se puede activar manualmente

jobs:
  buscar-icc:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Buscar ICC en INDEC
        run: |
          python3 << PYEOF
          import urllib.request, json, re
          from datetime import datetime

          url = "https://www.indec.gob.ar/indec/web/Nivel4-Tema-3-5-33"
          req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
          try:
              with urllib.request.urlopen(req, timeout=30) as r:
                  html = r.read().decode("utf-8", errors="ignore")
              patron = r"correspondiente a\s+(\w+)\s+de\s+(\d{4})\s+registra una\s+(?:suba|baja)\s+de\s+([\d,\.]+)%"
              m = re.search(patron, html, re.IGNORECASE)
              if m:
                  pct = float(m.group(3).replace(",","."))
                  res = {"encontrado": True, "mes": m.group(1), "anio": int(m.group(2)), "pct": pct, "ts": datetime.utcnow().isoformat()}
              else:
                  res = {"encontrado": False, "error": "No se encontro el dato", "ts": datetime.utcnow().isoformat()}
          except Exception as e:
              res = {"encontrado": False, "error": str(e), "ts": datetime.utcnow().isoformat()}

          with open("icc-data.json", "w") as f:
              json.dump(res, f, ensure_ascii=False)
          print(json.dumps(res))
          PYEOF

      - name: Commit y push
        run: |
          git config user.name "icc-bot"
          git config user.email "bot@fj-app"
          git add icc-data.json
          git diff --staged --quiet || git commit -m "ICC actualizado $(date +%Y-%m-%d)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
